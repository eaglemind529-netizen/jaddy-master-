<html lang="es">

    <style>

</head>
<body>

    <div id="app">
        <!-- Navegación -->
        <nav class="p-5 border-b border-white/5 bg-black/80 backdrop-blur-2xl sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="admin.html" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center hover:bg-orange-600 transition-all">
                        <i data-lucide="arrow-left" class="text-white w-5 h-5"></i>
                    </a>
                    <div>
                        <h1 class="text-lg font-black uppercase italic tracking-tighter text-white leading-none">Panel VIP</h1>
                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest mt-1">Control de Membresías</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleForm()" class="px-5 py-2.5 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> NUEVO ARTISTA
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 pt-10">
            <!-- Formulario de Registro -->
            <section id="artistForm" class="hidden mb-12 glass-card p-8 rounded-[2.5rem] border-orange-500/20 border">

                <form id="saveArtistForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-neutral-500 uppercase px-1">Identidad</label>
                        <input type="text" id="artistName" placeholder="Nombre Artístico" required>

                        <input type="text" id="phone" placeholder="Número de Teléfono" required>

                        <input type="email" id="artistEmail" placeholder="Correo para Acceso VIP" required>

                            <option value="premium">PLAN PREMIUM (Grabación + Beats)</option>
                            <option value="elite">PLAN ELITE (Producción Completa)</option>

                        </select>
                        <input type="text" id="vipCode" placeholder="Código de Acceso VIP" class="font-mono text-orange-500">
                    </div>
                    <button type="submit" class="md:col-span-2 lg:col-span-3 bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-orange-500 hover:text-white transition-all">
                        <i data-lucide="save" class="w-5 h-5"></i> GUARDAR ARTISTA EN BASE DE DATOS
                    </button>
                </form>
            </section>

            <!-- Lista de Artistas -->
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-white mb-8">Artistas Registrados</h2>
            <div id="artistsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Se cargan dinámicamente -->
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleForm = () => {
            document.getElementById('artistForm').classList.toggle('hidden');
        };

        // Generar código VIP aleatorio si está vacío
        document.getElementById('vipCode').value = 'VIP-' + Math.random().toString(36).substr(2, 6).toUpperCase();

        // Guardar Artista
        document.getElementById('saveArtistForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, 'artistasVIP'), {
                    artistName: document.getElementById('artistName').value,
                    realName: document.getElementById('realName').value,
                    idCard: document.getElementById('idCard').value,
                    phone: document.getElementById('phone').value,
                    location: document.getElementById('location').value,
                    email: document.getElementById('artistEmail').value,
                    plan: document.getElementById('plan').value,
                    vipCode: document.getElementById('vipCode').value,
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                toggleForm();
                alert("Artista registrado con éxito");
            } catch (err) {
                alert("Error al registrar: " + err.message);
            }
        };

        // Cargar Artistas en tiempo real
        onSnapshot(collection(db, 'artistasVIP'), (snap) => {
            const list = document.getElementById('artistsList');
            list.innerHTML = '';
            
            snap.forEach(docSnap => {
                const a = docSnap.data();
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-3xl border border-white/5 relative overflow-hidden group";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-orange-600/20 rounded-2xl flex items-center justify-center">
                            <i data-lucide="user" class="text-orange-500 w-6 h-6"></i>
                        </div>
                        <span class="text-[8px] font-black uppercase px-3 py-1 bg-white/5 rounded-full text-neutral-400 border border-white/5">${a.plan}</span>
                    </div>
                    <h3 class="font-black uppercase italic text-xl text-white mb-1 tracking-tighter">${a.artistName}</h3>
                    <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-widest mb-4">${a.realName}</p>
                    
                    <div class="space-y-2 mb-6">
                        <div class="flex items-center gap-2 text-[10px] font-bold text-neutral-400">
                            <i data-lucide="phone" class="w-3 h-3 text-orange-500"></i> ${a.phone}
                        </div>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-neutral-400">
                            <i data-lucide="map-pin" class="w-3 h-3 text-orange-500"></i> ${a.location}
                        </div>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-orange-500 bg-orange-500/5 p-2 rounded-lg border border-orange-500/10">
                            <i data-lucide="key" class="w-3 h-3"></i> COD: ${a.vipCode}
                        </div>
                    </div>

                    <button onclick="deleteArtist('${docSnap.id}')" class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all opacity-0 group-hover:opacity-100">
                        Eliminar Artista
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        });

        window.deleteArtist = async (id) => {
            if(confirm("¿Seguro que deseas eliminar este artista del sistema VIP?")) {
                await deleteDoc(doc(db, 'artistasVIP', id));
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
