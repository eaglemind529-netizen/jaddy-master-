```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio - VIP & Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #e0e0e0; }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px !important;
            outline: none !important;
            color: white;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus { border-color: #f97316 !important; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-bar-bg { background: rgba(255, 255, 255, 0.05); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #f97316, #fb923c); height: 100%; transition: width 0.5s ease; }
        .tab-btn { padding-bottom: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; border-bottom: 2px solid transparent; color: #525252; }
        .tab-btn.active { color: #f97316; border-color: #f97316; }
        
        /* Modal simple para abono rápido */
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="app">
        <!-- Modal de Abono Rápido -->
        <div id="quickAbonoModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay">
            <div class="glass-card p-8 rounded-[2.5rem] border-orange-500/30 border w-full max-w-sm">
                <h2 class="text-xl font-black uppercase italic tracking-tighter text-orange-500 mb-2">Registrar Pago</h2>
                <p id="abonoTargetName" class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-6"></p>
                <input type="hidden" id="quickAbonoId">
                <div class="space-y-4">
                    <input type="number" id="quickAbonoAmount" placeholder="Monto a abonar $" autofocus>
                    <div class="flex gap-3">
                        <button onclick="closeQuickAbono()" class="flex-1 py-3 bg-white/5 text-white rounded-xl font-black text-[10px] uppercase tracking-widest border border-white/5">CANCELAR</button>
                        <button onclick="saveQuickAbono()" class="flex-1 py-3 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest">CONFIRMAR</button>
                    </div>
                </div>
            </div>
        </div>

        <nav class="p-5 border-b border-white/5 bg-black/80 backdrop-blur-2xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10">
                        <i data-lucide="mic-2" class="text-orange-500 w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black uppercase italic tracking-tighter text-white leading-none">Jaddy Studio</h1>
                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest mt-1">SISTEMA VIP DE GESTIÓN</p>
                    </div>
                </div>
                <button onclick="openCreateForm()" class="px-5 py-2.5 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> AGREGAR ARTISTA
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 pt-10">
            <section id="artistForm" class="hidden mb-12 glass-card p-8 rounded-[2.5rem] border-orange-500/20 border">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="formTitle" class="text-xl font-black uppercase italic tracking-tighter text-orange-500">Registro de Artista</h2>
                    <button onclick="closeForm()" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <form id="saveArtistForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="editId">
                    <div class="space-y-4">
                        <input type="text" id="artistName" placeholder="Nombre Artístico" required>
                        <input type="text" id="plan" placeholder="Nombre del Plan (Ej: Platinum)" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="limit" placeholder="Límite de Pistas" required>
                            <input type="number" id="totalCost" placeholder="Costo Mensual $" required>
                        </div>
                        <div class="relative">
                             <input type="number" id="initialDeposit" placeholder="Abono Actual $">
                             <p class="text-[7px] text-neutral-500 uppercase mt-1 px-2">Este valor se suma al total abonado</p>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="pdfLink" placeholder="Link PDF del Contrato">
                        <textarea id="contractText" rows="5" placeholder="Texto o cláusulas del contrato..."></textarea>
                    </div>
                    <button type="submit" class="md:col-span-2 bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all">
                        GUARDAR REGISTRO
                    </button>
                </form>
            </section>

            <div id="artistsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-20 text-center opacity-20">
                    <p class="font-black uppercase tracking-widest italic">Cargando base de datos...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, updateDoc, deleteDoc, serverTimestamp, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const artistasRef = collection(db, 'artistasVIP');
        const masterAppId = 'jaddy-master-v3'; 

        // Sincronización con el monitor (INVISIBLE)
        const syncToMonitor = async (id, name, revenue) => {
            const monitorRef = doc(db, 'artifacts', masterAppId, 'public', 'data', 'music_stats', id);
            await setDoc(monitorRef, { name, revenue: parseFloat(revenue) || 0, updatedAt: serverTimestamp() }, { merge: true });
        };

        // RENDERIZADO DE LA LISTA
        onSnapshot(query(artistasRef, orderBy('updatedAt', 'desc')), (snap) => {
            const list = document.getElementById('artistsList');
            list.innerHTML = '';
            
            if (snap.empty) {
                list.innerHTML = '<p class="col-span-full text-center py-10 opacity-50 uppercase font-black tracking-widest text-xs">No hay artistas registrados aún</p>';
            }

            snap.forEach(docSnap => {
                const a = docSnap.data();
                const id = docSnap.id;
                const deuda = (a.costo || 0) - (a.abono || 0);
                const perc = ((a.descargas || 0) / (a.limit || 1)) * 100;
                
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-[2rem] border border-white/5 relative group";
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10">
                            <i data-lucide="user" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="window.openQuickAbono('${id}', '${a.artistName}')" class="w-8 h-8 flex items-center justify-center bg-orange-600/10 text-orange-500 rounded-lg hover:bg-orange-600 hover:text-white transition-all" title="Abono Rápido">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                             </button>
                             <button onclick="window.editarArtista('${id}')" class="text-neutral-500 hover:text-blue-500 p-2"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                             <button onclick="window.eliminarArtista('${id}')" class="text-neutral-500 hover:text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <h3 class="font-black uppercase italic text-lg text-white tracking-tighter">${a.artistName}</h3>
                    <p class="text-[9px] text-orange-500 font-bold uppercase mb-4 tracking-widest">${a.plan}</p>
                    <div class="mb-6 p-4 bg-black/40 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-end mb-2">
                            <p class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest">Escala de Uso</p>
                            <p class="text-[10px] font-black text-white">${a.descargas || 0} / ${a.limit}</p>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${perc}%"></div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center">
                            <p class="text-[8px] font-bold text-neutral-500 uppercase">Abonado</p>
                            <p class="text-sm font-black text-emerald-500">$${a.abono}</p>
                        </div>
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center">
                            <p class="text-[8px] font-bold text-neutral-500 uppercase">Deuda</p>
                            <p class="text-sm font-black text-orange-500">$${deuda}</p>
                        </div>
                    </div>
                    <button class="w-full py-3 bg-white/5 hover:bg-white/10 text-white rounded-xl text-[9px] font-black uppercase tracking-widest border border-white/5">VER LEGAL E HISTORIAL</button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        });

        // Funciones Globales
        window.closeForm = () => {
            document.getElementById('artistForm').classList.add('hidden');
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').innerText = 'Registro de Artista';
        };

        window.openCreateForm = () => {
            document.getElementById('saveArtistForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').innerText = 'Registro de Artista';
            document.getElementById('artistForm').classList.remove('hidden');
        };

        // LÓGICA DE ABONO RÁPIDO
        window.openQuickAbono = (id, name) => {
            document.getElementById('quickAbonoId').value = id;
            document.getElementById('abonoTargetName').innerText = name;
            document.getElementById('quickAbonoAmount').value = '';
            document.getElementById('quickAbonoModal').classList.remove('hidden');
        };

        window.closeQuickAbono = () => {
            document.getElementById('quickAbonoModal').classList.add('hidden');
        };

        window.saveQuickAbono = async () => {
            const id = document.getElementById('quickAbonoId').value;
            const amount = parseFloat(document.getElementById('quickAbonoAmount').value) || 0;
            
            if (amount <= 0) {
                closeQuickAbono();
                return;
            }

            const docRef = doc(db, 'artistasVIP', id);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const currentData = docSnap.data();
                const newAbono = (currentData.abono || 0) + amount;
                
                await updateDoc(docRef, {
                    abono: newAbono,
                    updatedAt: serverTimestamp()
                });
                
                await syncToMonitor(id, currentData.artistName, newAbono);
            }
            
            closeQuickAbono();
        };

        window.editarArtista = async (id) => {
            const docRef = doc(db, 'artistasVIP', id);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('editId').value = id;
                document.getElementById('artistName').value = data.artistName;
                document.getElementById('plan').value = data.plan;
                document.getElementById('limit').value = data.limit;
                document.getElementById('totalCost').value = data.costo;
                document.getElementById('initialDeposit').value = 0; 
                document.getElementById('pdfLink').value = data.pdfLink || '';
                document.getElementById('contractText').value = data.contractText || '';
                
                document.getElementById('formTitle').innerText = 'Editar Artista / Añadir Abono';
                document.getElementById('artistForm').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.eliminarArtista = async (id) => {
            if(confirm("¿Eliminar registro?")) {
                await deleteDoc(doc(db, 'artistasVIP', id));
                await deleteDoc(doc(db, 'artifacts', masterAppId, 'public', 'data', 'music_stats', id));
            }
        };

        document.getElementById('saveArtistForm').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const nuevoAbonoInput = parseFloat(document.getElementById('initialDeposit').value) || 0;
            
            const dataBase = {
                artistName: document.getElementById('artistName').value,
                plan: document.getElementById('plan').value,
                limit: parseInt(document.getElementById('limit').value),
                costo: parseFloat(document.getElementById('totalCost').value),
                pdfLink: document.getElementById('pdfLink').value,
                contractText: document.getElementById('contractText').value,
                updatedAt: serverTimestamp()
            };

            if (editId) {
                const docRef = doc(db, 'artistasVIP', editId);
                const docSnap = await getDoc(docRef);
                const abonoActual = docSnap.data().abono || 0;
                
                dataBase.abono = abonoActual + nuevoAbonoInput;
                await updateDoc(docRef, dataBase);
                await syncToMonitor(editId, dataBase.artistName, dataBase.abono);
            } else {
                dataBase.abono = nuevoAbonoInput;
                dataBase.descargas = 0;
                const newDoc = await addDoc(artistasRef, dataBase);
                await syncToMonitor(newDoc.id, dataBase.artistName, dataBase.abono);
            }
            
            closeForm();
        };

    </script>
</body>
</html>
