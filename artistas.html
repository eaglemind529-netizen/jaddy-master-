```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio - Control VIP & Membresías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #e0e0e0; }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px !important;
            outline: none !important;
            color: white;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus { border-color: #f97316 !important; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="app">
        <!-- Modal -->
        <div id="quickAbonoModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay">
            <div class="glass-card p-8 rounded-[2.5rem] border-orange-500/30 border w-full max-w-sm">
                <h2 class="text-xl font-black uppercase italic tracking-tighter text-orange-500 mb-2">Registrar Pago</h2>
                <p id="abonoTargetName" class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-6"></p>
                <input type="hidden" id="quickAbonoId">
                <input type="number" id="quickAbonoAmount" placeholder="Monto $" class="mb-4">
                <div class="flex gap-3">
                    <button onclick="closeQuickAbono()" class="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest">CANCELAR</button>
                    <button onclick="saveQuickAbono()" class="flex-1 py-3 bg-orange-600 rounded-xl text-[10px] font-black uppercase tracking-widest">PROCESAR</button>
                </div>
            </div>
        </div>

        <nav class="p-5 border-b border-white/5 bg-black/80 backdrop-blur-2xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-orange-600/20 rounded-xl flex items-center justify-center border border-orange-500/20">
                        <i data-lucide="crown" class="text-orange-500 w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black uppercase italic tracking-tighter text-white leading-none">Jaddy Studio</h1>
                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest mt-1">GESTIÓN DE MEMBRESÍAS VIP</p>
                    </div>
                </div>
                <button onclick="openCreateForm()" class="px-5 py-2.5 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> NUEVO ARTISTA VIP
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 pt-10">
            <section id="artistForm" class="hidden mb-12 glass-card p-8 rounded-[2.5rem] border-orange-500/20 border">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="formTitle" class="text-xl font-black uppercase italic tracking-tighter text-orange-500">Alta de Membresía</h2>
                    <button onclick="closeForm()" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <form id="saveArtistForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="editId">
                    <input type="text" id="artistName" placeholder="Nombre del Artista" required>
                    <input type="text" id="plan" placeholder="Nombre del Plan" required>
                    <input type="number" id="limit" placeholder="Límite Servicios/Mes" required>
                    <input type="number" id="totalCost" placeholder="Mensualidad $" required>
                    <input type="number" id="initialDeposit" placeholder="Abono Inicial $" class="md:col-span-2">
                    <button type="submit" class="md:col-span-2 bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500 transition-all">ACTIVAR MEMBRESÍA</button>
                </form>
            </section>

            <h2 class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-6">Artistas VIP Activos</h2>
            <div id="artistsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-20"></div>

            <h2 class="text-[10px] font-black text-neutral-600 uppercase tracking-widest mb-6 border-t border-white/5 pt-10">Historial de Eliminados (Recuperar)</h2>
            <div id="archivedList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, updateDoc, serverTimestamp, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const artistasRef = collection(db, 'artistasVIP');

        const syncToMonitor = async (id, name, abono) => {
            const monitorRef = doc(db, 'artifacts', 'jaddy-master-v3', 'public', 'data', 'vip_report', id);
            await setDoc(monitorRef, { name, ingresoVIP: parseFloat(abono) || 0, fechaRegistro: serverTimestamp(), active: true }, { merge: true });
        };

        onSnapshot(query(artistasRef, orderBy('updatedAt', 'desc')), (snap) => {
            const list = document.getElementById('artistsList');
            const arc = document.getElementById('archivedList');
            list.innerHTML = ''; arc.innerHTML = '';
            
            snap.forEach(docSnap => {
                const a = docSnap.data();
                const id = docSnap.id;
                
                if (a.status === 'archived') {
                    arc.innerHTML += `
                        <div class="glass-card p-4 rounded-xl flex justify-between items-center text-[10px]">
                            <span class="font-bold text-neutral-400">${a.artistName}</span>
                            <button onclick="window.recuperarArtista('${id}')" class="text-emerald-500 font-black uppercase underline">Recuperar</button>
                        </div>`;
                } else {
                    const deuda = (a.costo || 0) - (a.abono || 0);
                    list.innerHTML += `
                        <div class="glass-card p-6 rounded-[2rem] border border-white/5">
                            <div class="flex justify-between mb-4">
                                <div class="w-10 h-10 bg-orange-600/20 rounded-xl flex items-center justify-center border border-orange-500/20">
                                    <i data-lucide="crown" class="text-orange-500 w-5 h-5"></i>
                                </div>
                                <div class="flex gap-2">
                                     <button onclick="window.openQuickAbono('${id}', '${a.artistName}')" class="w-8 h-8 flex items-center justify-center bg-emerald-600/20 text-emerald-500 rounded-lg hover:bg-emerald-600 hover:text-white transition-all"><i data-lucide="dollar-sign" class="w-4 h-4"></i></button>
                                     <button onclick="window.archivarArtista('${id}')" class="text-neutral-500 hover:text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            <h3 class="font-black uppercase italic text-lg text-white">${a.artistName}</h3>
                            <p class="text-[9px] text-orange-500 font-bold uppercase mb-6">${a.plan}</p>
                            <div class="grid grid-cols-2 gap-3 text-center">
                                <div class="bg-black/40 p-3 rounded-2xl"><p class="text-[8px] text-neutral-500">Abonado</p><p class="text-sm font-black text-emerald-500">$${a.abono || 0}</p></div>
                                <div class="bg-black/40 p-3 rounded-2xl"><p class="text-[8px] text-neutral-500">Saldo</p><p class="text-sm font-black text-orange-500">$${deuda > 0 ? deuda : 0}</p></div>
                            </div>
                        </div>`;
                }
            });
            lucide.createIcons();
        });

        window.recuperarArtista = async (id) => {
            const snap = await getDoc(doc(db, 'artistasVIP', id));
            await updateDoc(doc(db, 'artistasVIP', id), { status: 'active', updatedAt: serverTimestamp() });
            await syncToMonitor(id, snap.data().artistName, snap.data().abono);
        };

        window.archivarArtista = async (id) => {
            if(confirm("¿Archivar artista?")) {
                await updateDoc(doc(db, 'artistasVIP', id), { status: 'archived', updatedAt: serverTimestamp() });
                const monitorRef = doc(db, 'artifacts', 'jaddy-master-v3', 'public', 'data', 'vip_report', id);
                await updateDoc(monitorRef, { active: false });
            }
        };

        // Funciones auxiliares
        window.openCreateForm = () => { document.getElementById('saveArtistForm').reset(); document.getElementById('artistForm').classList.toggle('hidden'); };
        window.closeForm = () => document.getElementById('artistForm').classList.add('hidden');
        window.openQuickAbono = (id, name) => { document.getElementById('quickAbonoId').value = id; document.getElementById('abonoTargetName').innerText = name; document.getElementById('quickAbonoModal').classList.remove('hidden'); };
        window.closeQuickAbono = () => document.getElementById('quickAbonoModal').classList.add('hidden');
        window.saveQuickAbono = async () => { const id = document.getElementById('quickAbonoId').value; const amount = parseFloat(document.getElementById('quickAbonoAmount').value) || 0; const docRef = doc(db, 'artistasVIP', id); const snap = await getDoc(docRef); const newAbono = (snap.data().abono || 0) + amount; await updateDoc(docRef, { abono: newAbono, updatedAt: serverTimestamp() }); await syncToMonitor(id, snap.data().artistName, newAbono); closeQuickAbono(); };

        document.getElementById('saveArtistForm').onsubmit = async (e) => { e.preventDefault(); const data = { artistName: document.getElementById('artistName').value, plan: document.getElementById('plan').value, limit: parseInt(document.getElementById('limit').value), costo: parseFloat(document.getElementById('totalCost').value), abono: parseFloat(document.getElementById('initialDeposit').value) || 0, status: 'active', updatedAt: serverTimestamp() }; const newDoc = await addDoc(artistasRef, data); await syncToMonitor(newDoc.id, data.artistName, data.abono); closeForm(); };
    </script>
</body>
</html>
