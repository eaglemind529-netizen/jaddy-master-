```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio - VIP & Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #e0e0e0; }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px !important;
            outline: none !important;
            color: white;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus { border-color: #f97316 !important; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        
        .progress-bar-bg { background: rgba(255, 255, 255, 0.05); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #f97316, #fb923c); height: 100%; transition: width 0.5s ease; }

        /* Tabs discretos para el historial */
        .tab-btn { padding-bottom: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; border-bottom: 2px solid transparent; color: #525252; }
        .tab-btn.active { color: #f97316; border-color: #f97316; }
    </style>
</head>
<body>

    <div id="app">
        <nav class="p-5 border-b border-white/5 bg-black/80 backdrop-blur-2xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10">
                        <i data-lucide="mic-2" class="text-orange-500 w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black uppercase italic tracking-tighter text-white leading-none">Jaddy Studio</h1>
                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest mt-1">SISTEMA VIP DE GESTIÓN</p>
                    </div>
                </div>
                <button onclick="openCreateForm()" class="px-5 py-2.5 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> AGREGAR ARTISTA
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 pt-10">
            <section id="artistForm" class="hidden mb-12 glass-card p-8 rounded-[2.5rem] border-orange-500/20 border">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="formTitle" class="text-xl font-black uppercase italic tracking-tighter text-orange-500">Registro de Artista</h2>
                    <button onclick="closeForm()" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <form id="saveArtistForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="editId">
                    <div class="space-y-4">
                        <input type="text" id="artistName" placeholder="Nombre Artístico" required>
                        <input type="text" id="plan" placeholder="Nombre del Plan (Ej: Platinum)" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="limit" placeholder="Límite de Pistas" required>
                            <input type="number" id="totalCost" placeholder="Costo Mensual $" required>
                        </div>
                        <input type="number" id="initialDeposit" placeholder="Abono Inicial $">
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="pdfLink" placeholder="Link PDF del Contrato">
                        <textarea id="contractText" rows="5" placeholder="Texto o cláusulas del contrato..."></textarea>
                    </div>
                    <button type="submit" class="md:col-span-2 bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all">
                        GUARDAR REGISTRO
                    </button>
                </form>
            </section>

            <div id="artistsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <!-- Modal Unificado: Contrato + Historial -->
    <div id="modalContrato" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-2xl p-8 rounded-[2.5rem] border border-white/10 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-black uppercase italic text-white tracking-tighter"></h2>
                <button onclick="closeModal('modalContrato')" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <!-- Selector de Tabs -->
            <div class="flex gap-6 mb-6 border-b border-white/5">
                <button id="tabContrato" onclick="switchTab('contrato')" class="tab-btn active">Contrato</button>
                <button id="tabHistorial" onclick="switchTab('historial')" class="tab-btn">Historial de Ciclos</button>
            </div>

            <!-- Contenido: Contrato -->
            <div id="contentContrato" class="flex flex-col flex-1 overflow-hidden">
                <div id="pdfAction" class="mb-4"></div>
                <div class="overflow-y-auto bg-black/50 p-6 rounded-2xl border border-white/5 flex-1 custom-scrollbar">
                    <pre id="modalContent" class="text-sm text-neutral-300 whitespace-pre-wrap font-sans leading-relaxed"></pre>
                </div>
            </div>

            <!-- Contenido: Historial -->
            <div id="contentHistorial" class="hidden flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2">
                <div id="historyContainer" class="space-y-3">
                    <!-- Cards de historial se cargan aquí -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const artistasRef = collection(db, 'artistasVIP');

        window.openCreateForm = () => {
            document.getElementById('editId').value = '';
            document.getElementById('saveArtistForm').reset();
            document.getElementById('formTitle').innerText = 'Registro de Artista';
            document.getElementById('artistForm').classList.remove('hidden');
        };

        window.closeForm = () => document.getElementById('artistForm').classList.add('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.switchTab = (target) => {
            const isContrato = target === 'contrato';
            document.getElementById('contentContrato').classList.toggle('hidden', !isContrato);
            document.getElementById('contentHistorial').classList.toggle('hidden', isContrato);
            document.getElementById('tabContrato').classList.toggle('active', isContrato);
            document.getElementById('tabHistorial').classList.toggle('active', !isContrato);
        };

        const getDaysRemaining = (createdAt) => {
            if (!createdAt) return "Calculando...";
            const created = createdAt.toDate ? createdAt.toDate() : new Date();
            const nextRenewal = new Date(created);
            nextRenewal.setMonth(nextRenewal.getMonth() + 1);
            const diff = nextRenewal - new Date();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return days > 0 ? `${days} días` : "Vencido";
        };

        window.usarPista = async (id, actual, limite) => {
            if (actual < limite) {
                await updateDoc(doc(db, 'artistasVIP', id), { descargas: actual + 1, updatedAt: serverTimestamp() });
            }
        };

        // FUNCIÓN RENOVAR CICLO (Guarda historial y limpia la tarjeta)
        window.renovarCiclo = async (id, nombre, actuales, abono, costo) => {
            const confirmar = confirm(`¿Estás seguro de RENOVAR el ciclo de ${nombre}? Se guardará el registro de ${actuales} pistas y abono de $${abono}.`);
            if (!confirmar) return;

            try {
                // 1. Guardar en subcolección de historial
                const histRef = collection(db, 'artistasVIP', id, 'historial');
                await addDoc(histRef, {
                    pistasUsadas: actuales,
                    pagoRealizado: abono,
                    costoTotal: costo,
                    fechaCierre: new Date().toLocaleDateString(),
                    timestamp: serverTimestamp()
                });

                // 2. Resetear valores en el documento principal
                await updateDoc(doc(db, 'artistasVIP', id), {
                    descargas: 0,
                    abono: 0,
                    createdAt: serverTimestamp(), // Reinicia la cuenta regresiva de 30 días
                    updatedAt: serverTimestamp()
                });

                alert("Ciclo renovado con éxito.");
            } catch (error) {
                console.error("Error al renovar:", error);
            }
        };

        window.editarArtista = async (id) => {
            const docRef = doc(db, 'artistasVIP', id);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const a = snap.data();
                document.getElementById('editId').value = id;
                document.getElementById('artistName').value = a.artistName;
                document.getElementById('plan').value = a.plan;
                document.getElementById('limit').value = a.limit;
                document.getElementById('totalCost').value = a.costo;
                document.getElementById('initialDeposit').value = a.abono;
                document.getElementById('contractText').value = a.contractText || '';
                document.getElementById('pdfLink').value = a.pdfLink || '';
                document.getElementById('artistForm').classList.remove('hidden');
                window.scrollTo(0,0);
            }
        };

        window.eliminarArtista = async (id) => {
            if(confirm("¿Eliminar este registro permanentemente?")) await deleteDoc(doc(db, 'artistasVIP', id));
        };

        window.verContrato = async (id, nombre, texto, pdf) => {
            document.getElementById('modalTitle').innerText = nombre;
            document.getElementById('modalContent').innerText = texto || "Sin cláusulas registradas.";
            const pdfAction = document.getElementById('pdfAction');
            pdfAction.innerHTML = pdf ? `<a href="${pdf}" target="_blank" class="text-orange-500 font-black text-[10px] uppercase underline flex items-center gap-1"><i data-lucide="external-link" class="w-3 h-3"></i> Abrir Contrato PDF</a>` : '';
            
            // Cargar Historial
            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = '<p class="text-[10px] font-bold text-neutral-600 uppercase tracking-widest text-center py-10">Buscando historial...</p>';
            
            const q = query(collection(db, 'artistasVIP', id, 'historial'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                historyContainer.innerHTML = '';
                if(snapshot.empty) {
                    historyContainer.innerHTML = '<p class="text-[10px] font-bold text-neutral-600 uppercase tracking-widest text-center py-10">No hay ciclos anteriores grabados.</p>';
                }
                snapshot.forEach(doc => {
                    const h = doc.data();
                    const div = document.createElement('div');
                    div.className = "bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center";
                    div.innerHTML = `
                        <div>
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-tighter">${h.fechaCierre}</p>
                            <p class="text-[9px] text-neutral-400 font-bold uppercase">${h.pistasUsadas} Pistas Grabadas</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-white">$${h.pagoRealizado}</p>
                            <p class="text-[8px] text-neutral-500 font-bold uppercase tracking-widest">Abonado de $${h.costoTotal}</p>
                        </div>
                    `;
                    historyContainer.appendChild(div);
                });
            });

            switchTab('contrato');
            document.getElementById('modalContrato').classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('saveArtistForm').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const data = {
                artistName: document.getElementById('artistName').value,
                plan: document.getElementById('plan').value,
                limit: parseInt(document.getElementById('limit').value),
                costo: parseFloat(document.getElementById('totalCost').value),
                abono: parseFloat(document.getElementById('initialDeposit').value) || 0,
                contractText: document.getElementById('contractText').value,
                pdfLink: document.getElementById('pdfLink').value,
                updatedAt: serverTimestamp()
            };

            if (editId) {
                await updateDoc(doc(db, 'artistasVIP', editId), data);
            } else {
                data.descargas = 0;
                data.createdAt = serverTimestamp();
                await addDoc(artistasRef, data);
            }
            closeForm();
        };

        onSnapshot(query(artistasRef, orderBy('updatedAt', 'desc')), (snap) => {
            const list = document.getElementById('artistsList');
            list.innerHTML = '';
            snap.forEach(docSnap => {
                const a = docSnap.data();
                const id = docSnap.id;
                const deuda = a.costo - a.abono;
                const perc = (a.descargas / a.limit) * 100;
                const diasRestantes = getDaysRemaining(a.createdAt);
                
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-[2rem] border border-white/5 relative group";
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10">
                            <i data-lucide="user" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="flex gap-1">
                             <button onclick="renovarCiclo('${id}', '${a.artistName}', ${a.descargas}, ${a.abono}, ${a.costo})" title="Renovar Ciclo" class="p-2 text-neutral-500 hover:text-orange-500 transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                             <button onclick="editarArtista('${id}')" class="p-2 text-neutral-500 hover:text-white transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                             <button onclick="eliminarArtista('${id}')" class="p-2 text-neutral-500 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <h3 class="font-black uppercase italic text-lg text-white mb-0 tracking-tighter">${a.artistName}</h3>
                    <p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest mb-4">${a.plan}</p>
                    
                    <div class="mb-6 p-4 bg-black/40 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-end mb-2">
                            <p class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest">Escala de Uso</p>
                            <p class="text-[10px] font-black text-white">${a.descargas} / ${a.limit} pistas</p>
                        </div>
                        <div class="progress-bar-bg mb-3">
                            <div class="progress-bar-fill" style="width: ${perc}%"></div>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-white/5">
                            <div class="flex items-center gap-2">
                                <i data-lucide="clock" class="w-3 h-3 text-orange-500"></i>
                                <p class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest">Vence en:</p>
                            </div>
                            <p class="text-[10px] font-black text-orange-500">${diasRestantes}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                            <p class="text-[8px] font-bold text-neutral-500 uppercase mb-1 tracking-widest">Deuda</p>
                            <p class="text-sm font-black ${deuda > 0 ? 'text-orange-500' : 'text-emerald-500'}">$${deuda}</p>
                        </div>
                        <button onclick="usarPista('${id}', ${a.descargas}, ${a.limit})" class="bg-orange-600/10 hover:bg-orange-600 p-3 rounded-2xl border border-orange-500/20 text-orange-500 hover:text-white transition-all text-center">
                             <p class="text-[8px] font-black uppercase tracking-widest">+ Usar Pista</p>
                        </button>
                    </div>

                    <button onclick="verContrato('${id}', '${a.artistName}', \`${(a.contractText || '').replace(/\n/g, '\\n')}\`, '${a.pdfLink || ''}')" 
                        class="w-full py-3 bg-white/5 hover:bg-white/10 text-white rounded-xl text-[9px] font-black uppercase tracking-widest transition-all border border-white/5 flex items-center justify-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4 text-orange-500"></i> Ver Legal e Historial
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        });
    </script>
</body>
</html>

```
