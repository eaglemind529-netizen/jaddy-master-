
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy INC - Gestión de Variantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #e5e5e5;
            background-image: radial-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .variant-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .variant-card:hover { border-color: rgba(245, 158, 11, 0.3); background: rgba(255, 255, 255, 0.05); }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 12px !important;
            padding: 10px 14px !important;
            color: white !important;
            outline: none !important;
            font-size: 0.875rem !important;
        }
        input:focus { border-color: #f59e0b !important; }
        .btn-amber { background: linear-gradient(to right, #f59e0b, #d97706); color: black; font-weight: 900; }
        .badge-gender { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-6xl mx-auto px-4 pt-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                    <i data-lucide="layers" class="text-black"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black italic uppercase tracking-tighter text-white leading-none">Jaddy INC</h1>
                    <p class="text-[9px] font-bold text-amber-500 uppercase tracking-[0.3em]">Gestión de Variantes</p>
                </div>
            </div>
            <div class="bg-white/5 px-4 py-2 rounded-xl border border-white/5 text-right">
                <span id="totalProducts" class="text-xl font-black text-white">0</span>
                <p class="text-[8px] text-neutral-500 uppercase font-bold italic">Categorías Base</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Formulario Base (Categoría o Producto General) -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-[2rem]">
                    <h2 class="text-xs font-black uppercase text-amber-500 mb-6 flex items-center gap-2 italic">
                        <i data-lucide="package" class="w-4 h-4"></i> Producto Principal
                    </h2>
                    
                    <form id="mainForm" class="space-y-4">
                        <input type="hidden" id="mainId">
                        
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-neutral-500 ml-1">Nombre General (ej: Perfumes Árabes)</label>
                            <input type="text" id="mainName" placeholder="Nombre del grupo" required class="w-full">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-neutral-500 ml-1">Imagen Principal</label>
                            <input type="text" id="mainImg" placeholder="Link de foto de portada" required class="w-full">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-bold text-neutral-500 ml-1">Descripción corta</label>
                            <textarea id="mainDesc" rows="2" class="w-full resize-none" placeholder="Opcional..."></textarea>
                        </div>

                        <button type="submit" id="mainSubmit" class="w-full btn-amber py-4 rounded-xl text-xs uppercase italic mt-2">
                            Registrar Producto Base
                        </button>
                        <button type="button" onclick="resetAll()" id="cancelBtn" class="w-full text-white/40 text-[9px] uppercase font-bold hidden">Cancelar y Limpiar</button>
                    </form>
                </div>
            </div>

            <!-- Inventario y Gestión -->
            <div class="lg:col-span-8 space-y-6">
                <!-- PANEL DE VARIANTES (Solo se activa al elegir un producto) -->
                <div id="variantSection" class="hidden glass-panel p-6 rounded-[2rem] border-amber-500/40 bg-amber-500/[0.03]">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-xs font-black uppercase text-amber-500 italic">Agregar Variantes a:</h2>
                            <p id="currentProductName" class="text-xl font-black text-white uppercase italic"></p>
                        </div>
                        <button onclick="closeVariants()" class="bg-white/5 p-2 rounded-full hover:bg-white/10"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>

                    <form id="variantForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-3">
                                <input type="text" id="varTitle" placeholder="Nombre Variante (ej: Chocolate / Invictus)" required class="w-full border-amber-500/20">
                                <select id="varGender" class="w-full" required>
                                    <option value="Dama">Dama</option>
                                    <option value="Caballero">Caballero</option>
                                    <option value="Unisex">Unisex</option>
                                </select>
                                <input type="text" id="varSize" placeholder="Presentación (ej: 100ml / 1 Libra)" required class="w-full">
                            </div>
                            <div class="space-y-3">
                                <input type="text" id="varImg" placeholder="Link de Imagen (específica de variante)" class="w-full">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="varPriceOld" step="0.01" placeholder="Antes $" class="w-full border-red-500/20 text-red-400">
                                    <input type="number" id="varPriceNew" step="0.01" placeholder="Hoy $" required class="w-full border-green-500/20 text-green-400">
                                </div>
                                <button type="submit" class="w-full btn-amber py-3 rounded-xl text-[10px] uppercase">
                                    <i data-lucide="plus-circle" class="inline w-3 h-3 mr-1"></i> Guardar Variante
                                </button>
                            </div>
                        </div>
                    </form>

                    <div id="variantList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-8 border-t border-white/5 pt-6">
                        <!-- Variantes renderizadas aquí -->
                    </div>
                </div>

                <!-- Lista de Productos Existentes -->
                <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formatImg = (url) => {
            if (!url) return "https://via.placeholder.com/400?text=Jaddy+INC";
            return url.trim().replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        };

        // --- MANEJO DEL PRODUCTO PRINCIPAL ---
        const mainForm = document.getElementById('mainForm');
        mainForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('mainId').value;
            const data = {
                name: document.getElementById('mainName').value,
                img: document.getElementById('mainImg').value,
                description: document.getElementById('mainDesc').value,
                updatedAt: serverTimestamp()
            };

            if (id) {
                await updateDoc(doc(db, "perfumes", id), data);
            } else {
                data.variants = [];
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "perfumes"), data);
            }
            resetAll();
        });

        // --- MANEJO DE VARIANTES ---
        const variantForm = document.getElementById('variantForm');
        variantForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const mainId = document.getElementById('mainId').value;
            if(!mainId) return;

            const newVariant = {
                id: Date.now().toString(),
                title: document.getElementById('varTitle').value, // Nombre específico (ej: Chocolate)
                gender: document.getElementById('varGender').value,
                size: document.getElementById('varSize').value,
                priceOld: parseFloat(document.getElementById('varPriceOld').value || 0),
                priceNew: parseFloat(document.getElementById('varPriceNew').value),
                img: document.getElementById('varImg').value || "" 
            };

            await updateDoc(doc(db, "perfumes", mainId), {
                variants: arrayUnion(newVariant)
            });
            variantForm.reset();
            // Actualizar vista local de variantes
        });

        // --- ESCUCHA DE DATOS ---
        onSnapshot(query(collection(db, "perfumes"), orderBy("name", "asc")), (snap) => {
            const grid = document.getElementById('productsGrid');
            document.getElementById('totalProducts').innerText = snap.size;
            grid.innerHTML = "";
            
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const variants = p.variants || [];
                
                const card = document.createElement('div');
                card.className = "glass-panel p-4 rounded-[2rem] relative group cursor-pointer hover:border-amber-500/40 transition-all border-l-4 " + (variants.length > 0 ? "border-l-amber-500" : "border-l-transparent");
                card.onclick = () => selectProduct(id, p);
                
                card.innerHTML = `
                    <div class="flex gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-black/50 overflow-hidden flex-shrink-0 border border-white/5">
                            <img src="${formatImg(p.img)}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-grow min-w-0">
                            <h3 class="text-sm font-black text-white uppercase truncate">${p.name}</h3>
                            <p class="text-[9px] text-amber-500/60 uppercase font-black italic tracking-widest">${variants.length} VARIANTES ACTIVAS</p>
                            <div class="flex gap-1 mt-2">
                                <span class="bg-white/5 px-2 py-1 rounded text-[8px] font-bold text-white/40 uppercase">Toca para gestionar</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); window.deleteMain('${id}')" class="absolute top-2 right-2 p-2 rounded-full text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                grid.appendChild(card);

                // Si este es el producto que estamos editando actualmente, refrescar sus variantes
                if(document.getElementById('mainId').value === id) {
                    renderVariantsList(id, variants, p.img);
                }
            });
            lucide.createIcons();
        });

        window.selectProduct = (id, data) => {
            document.getElementById('mainId').value = id;
            document.getElementById('mainName').value = data.name;
            document.getElementById('mainImg').value = data.img;
            document.getElementById('mainDesc').value = data.description || "";
            
            document.getElementById('mainSubmit').innerText = "ACTUALIZAR DATOS BASE";
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('currentProductName').innerText = data.name;
            document.getElementById('variantSection').classList.remove('hidden');
            
            renderVariantsList(id, data.variants || [], data.img);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const renderVariantsList = (mainId, variants, mainImg) => {
            const list = document.getElementById('variantList');
            list.innerHTML = "";
            if(variants.length === 0) {
                list.innerHTML = "<p class='text-[10px] text-white/20 uppercase font-black text-center py-4 col-span-2'>No hay variantes registradas aún</p>";
                return;
            }

            variants.forEach(v => {
                const div = document.createElement('div');
                div.className = "variant-card p-4 rounded-2xl flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${formatImg(v.img || mainImg)}" class="w-12 h-12 rounded-xl object-cover bg-black border border-white/10">
                        <div>
                            <h4 class="text-[11px] font-black text-white uppercase leading-none mb-1">${v.title}</h4>
                            <div class="flex items-center gap-2">
                                <span class="badge-gender ${v.gender === 'Dama' ? 'bg-pink-500 text-black' : v.gender === 'Caballero' ? 'bg-blue-500 text-black' : 'bg-amber-500 text-black'}">${v.gender}</span>
                                <span class="text-[9px] text-white/40 font-bold">${v.size}</span>
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] font-black text-green-400">$${v.priceNew}</span>
                                ${v.priceOld > 0 ? `<span class="text-[8px] text-red-500/40 line-through italic font-bold">$${v.priceOld}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteVariant('${mainId}', ${JSON.stringify(v).replace(/"/g, '&quot;')})" class="text-white/20 hover:text-red-500">
                        <i data-lucide="trash" class="w-3 h-3"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        };

        window.deleteVariant = async (mainId, variantObj) => {
            await updateDoc(doc(db, "perfumes", mainId), { variants: arrayRemove(variantObj) });
        };

        window.deleteMain = async (id) => {
            if(confirm("¿Eliminar este producto y todas sus variantes?")) {
                await deleteDoc(doc(db, "perfumes", id));
                resetAll();
            }
        };

        window.closeVariants = () => {
            document.getElementById('variantSection').classList.add('hidden');
            resetAll();
        };

        const resetAll = () => {
            mainForm.reset();
            document.getElementById('mainId').value = "";
            document.getElementById('mainSubmit').innerText = "REGISTRAR PRODUCTO BASE";
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('variantSection').classList.add('hidden');
        };

        lucide.createIcons();
    </script>
</body>
</html>

```
