<!DOCTYPE html>
<html lang="es">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;

            background: rgba(255, 255, 255, 0.02) !important;

            padding: 12px 16px !important;
            color: white !important;
            width: 100%;

        .full-preview-container {
            width: 100%;
            aspect-ratio: 1 / 1;

            border-radius: 24px;

            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        #mainPreviewImg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;

        .btn-primary {
            background: linear-gradient(to right, #f59e0b, #d97706);

        .inventory-card:hover {
            border-color: rgba(245, 158, 11, 0.5);

    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                    <i data-lucide="sparkles" class="text-black w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Jaddy INC Admin</h1>
                    <p class="text-[10px] font-bold text-amber-500 uppercase tracking-[0.3em]">Gestión de Perfumería</p>
                </div>
            </div>
            <div class="flex gap-4 bg-white/5 p-2 rounded-2xl border border-white/5">
                <div class="px-4 py-2 text-center">
                    <p id="statCount" class="text-xl font-black text-white">0</p>
                    <p class="text-[8px] uppercase font-bold text-neutral-500 italic">Productos</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- FORMULARIO -->
            <div class="lg:col-span-7 glass-panel rounded-[2.5rem] p-8">
                <form id="productForm" class="space-y-6">
                    <input type="hidden" id="productId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase text-neutral-500 ml-2">Nombre Comercial</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase text-neutral-500 ml-2">Precio Sugerido ($)</label>
                            <input type="number" id="price" step="0.01" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase text-neutral-500 ml-2">Categoría</label>
                            <select id="category">
                                <option value="Caballero">Caballero</option>
                                <option value="Dama">Dama</option>
                                <option value="Unisex">Unisex</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase text-neutral-500 ml-2">Enlace de Dropbox</label>
                            <input type="text" id="imgUrl" placeholder="Pegue el link aquí..." required>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase text-neutral-500 ml-2">Descripción</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <div class="flex gap-4 pt-4">
                        <button type="submit" id="saveBtn" class="flex-grow btn-primary py-4 rounded-2xl font-black text-xs uppercase text-black">
                            Guardar Producto
                        </button>
                        <button type="button" id="resetBtn" class="hidden bg-white/10 px-6 rounded-2xl" onclick="clearForm()">
                            <i data-lucide="x" class="w-5 h-5 text-white"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- VISTA PREVIA -->
            <div class="lg:col-span-5">
                <div class="sticky top-8 space-y-4">
                    <div class="glass-panel p-4 rounded-[3rem]">
                        <div class="full-preview-container">
                            <div id="noImage" class="flex flex-col items-center gap-4 opacity-20">
                                <i data-lucide="image-plus" class="w-16 h-16"></i>
                            </div>
                            <img id="mainPreviewImg" src="" class="hidden">
                        </div>
                        <div class="mt-6 px-4 pb-4">
                            <h3 id="viewName" class="text-2xl font-black text-white italic uppercase">Nombre Perfume</h3>
                            <span id="viewPrice" class="text-3xl font-black text-amber-500 italic">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- LISTADO -->
        <div class="mt-20">
            <div id="inventoryContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNCIÓN CORREGIDA: Mantiene el rlkey y solo cambia dl=0 por raw=1
        const formatDropbox = (url) => {
            if (!url) return "";
            let cleanUrl = url.trim();
            if (cleanUrl.includes('dropbox.com')) {
                // Cambiamos el parámetro de descarga para que el navegador lo lea como imagen directa
                // Reemplazamos dl=0 por raw=1 si existe, o lo añadimos
                if (cleanUrl.includes('dl=0')) {
                    return cleanUrl.replace('dl=0', 'raw=1');
                } else if (!cleanUrl.includes('raw=1')) {
                    return cleanUrl + (cleanUrl.includes('?') ? '&raw=1' : '?raw=1');
                }
            }
            return cleanUrl;
        };

        const syncPreview = () => {
            const rawUrl = document.getElementById('imgUrl').value;
            const url = formatDropbox(rawUrl);
            const mainImg = document.getElementById('mainPreviewImg');
            const noImg = document.getElementById('noImage');

            if (url) {
                mainImg.src = url;
                mainImg.onload = () => { mainImg.classList.remove('hidden'); noImg.classList.add('hidden'); };
                mainImg.onerror = () => { mainImg.classList.add('hidden'); noImg.classList.remove('hidden'); };
            } else {
                mainImg.classList.add('hidden'); noImg.classList.remove('hidden');
            }
            document.getElementById('viewName').innerText = document.getElementById('name').value || "Nombre Perfume";
            document.getElementById('viewPrice').innerText = "$" + parseFloat(document.getElementById('price').value || 0).toFixed(2);
        };

        ['name', 'price', 'imgUrl'].forEach(id => document.getElementById(id).addEventListener('input', syncPreview));

        const form = document.getElementById('productForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const payload = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                img: document.getElementById('imgUrl').value, // Guardamos el link tal cual
                description: document.getElementById('description').value,
                updatedAt: serverTimestamp()
            };

            if (id) {
                await updateDoc(doc(db, "perfumes", id), payload);
            } else {
                payload.createdAt = serverTimestamp();
                await addDoc(collection(db, "perfumes"), payload);
            }
            clearForm();
        });

        window.editProduct = (id, dataJson) => {
            const data = JSON.parse(decodeURIComponent(dataJson));
            document.getElementById('productId').value = id;
            document.getElementById('name').value = data.name;
            document.getElementById('price').value = data.price;
            document.getElementById('category').value = data.category;
            document.getElementById('imgUrl').value = data.img;
            document.getElementById('description').value = data.description || "";
            document.getElementById('saveBtn').innerText = "ACTUALIZAR";
            document.getElementById('resetBtn').classList.remove('hidden');
            syncPreview();
        };

        window.clearForm = () => {
            form.reset();
            document.getElementById('productId').value = "";
            document.getElementById('saveBtn').innerText = "GUARDAR PRODUCTO";
            document.getElementById('resetBtn').classList.add('hidden');
            syncPreview();
        };

        window.removeProduct = async (id) => {
            if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "perfumes", id));
        };

        onSnapshot(query(collection(db, "perfumes"), orderBy("name", "asc")), (snap) => {
            const container = document.getElementById('inventoryContainer');
            document.getElementById('statCount').innerText = snap.size;
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const displayImg = formatDropbox(p.img);
                const dataString = encodeURIComponent(JSON.stringify(p));
                container.innerHTML += `
                    <div onclick="editProduct('${id}', '${dataString}')" class="inventory-card glass-panel p-3 rounded-[2rem] cursor-pointer group relative border border-transparent">
                        <div class="aspect-square rounded-[1.5rem] bg-black/40 overflow-hidden mb-3">
                            <img src="${displayImg}" class="w-full h-full object-cover">
                        </div>
                        <h4 class="text-[10px] font-black uppercase text-white truncate">${p.name}</h4>
                        <button onclick="event.stopPropagation(); removeProduct('${id}')" class="absolute top-4 right-4 w-8 h-8 bg-black/80 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i>
                        </button>
                    </div>`;
            });
            lucide.createIcons();
        });

        lucide.createIcons();
    </script>
</body>
</html>
