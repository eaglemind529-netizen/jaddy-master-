    <div id="app">
        <nav class="p-5 border-b border-white/5 bg-black/80 backdrop-blur-2xl sticky top-0 z-[60]">

                    <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-red-700 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-600/20">

                    </div>
                    <div>
                        <h1 class="text-xl font-black italic tracking-tighter leading-none text-white uppercase">Jaddy Studio</h1>
                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-[0.2em] mt-1">Marketplace & Studio</p>

        <main class="max-w-5xl mx-auto p-6 pt-10 pb-40">

                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold text-neutral-500 uppercase px-1">Contacto y Pago</label>

                        <input type="number" id="price" value="29.99">
                        <textarea id="description" class="h-28" placeholder="Descripción breve del beat..."></textarea>

                    <button type="submit" id="submitBtn" class="md:col-span-2 lg:col-span-3 bg-gradient-to-r from-orange-600 to-red-600 py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-3 hover:brightness-110 transition-all">
                        <i data-lucide="zap" class="w-5 h-5"></i> PUBLICAR BEAT
                    </button>
                </form>

            <div class="flex items-center justify-between mb-8">

        <div id="masterPlayer" class="hidden fixed bottom-0 left-0 right-0 z-[100] glass-player p-6 shadow-2xl">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-3">
                        <i data-lucide="activity" class="text-orange-500 animate-pulse w-5 h-5"></i>

                    </button>

                        <p id="playPrice" class="text-3xl font-black italic text-white mb-4"></p>
                        <button id="buyBtn" class="w-full bg-orange-600 text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 hover:bg-orange-500 transition-all shadow-lg shadow-orange-600/20">

                        </button>
                    </div>

            </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // TUS CREDENCIALES INTEGRADAS
        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b",
            measurementId: "G-SBBXXDD3TV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let beats = [];

        window.toggleForm = () => {
            const form = document.getElementById('beatForm');
            form.classList.toggle('hidden');
            form.classList.toggle('active');
        };

        window.closePlayer = () => {
            document.getElementById('masterPlayer').classList.add('hidden');
            document.getElementById('mediaContainer').innerHTML = '';
        };

        window.renderBeats = () => {
            const list = document.getElementById('beatsList');
            if (beats.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-neutral-600 font-bold uppercase text-xs">Aún no hay pistas. ¡Sube la primera!</div>`;
                return;
            }
            list.innerHTML = beats.map(beat => `
                <div class="group p-4 rounded-3xl border border-white/5 bg-[#0a0a0a] flex items-center gap-5 hover:border-orange-500/30 transition-all">
                    <button onclick="window.playBeat('${beat.id}')" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-neutral-400 hover:bg-orange-600 hover:text-white transition-all">
                        <i data-lucide="play" class="w-6 h-6 ml-1"></i>
                    </button>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black uppercase text-white truncate">${beat.title}</h3>
                        <p class="text-[9px] text-neutral-500 font-bold uppercase mt-1 tracking-widest">PROD. ${beat.producer || 'JADDY'}</p>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <p class="text-xl font-black italic text-white">$${beat.price}</p>
                        <button onclick="window.deleteBeat('${beat.id}')" class="p-2 text-neutral-800 hover:text-red-500 transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.playBeat = (id) => {
            const beat = beats.find(b => b.id === id);
            if (!beat) return;
            const player = document.getElementById('masterPlayer');
            const media = document.getElementById('mediaContainer');
            player.classList.remove('hidden');
            document.getElementById('playTitle').innerText = beat.title;
            document.getElementById('playPrice').innerText = `$${beat.price}`;
            
            if(beat.type === 'youtube') {
                media.innerHTML = `<div class="aspect-video rounded-3xl overflow-hidden border border-white/10"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${beat.src}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
            } else {
                media.innerHTML = `<div class="bg-black/40 p-6 rounded-3xl border border-white/5 shadow-inner">
                    <div class="flex justify-center items-end gap-1.5 h-14 mb-4">
                        ${Array(25).fill('<div class="w-1.5 bg-orange-600 rounded-full animate-audio-bar"></div>').join('')}
                    </div>
                    <audio src="${beat.url}" controls autoplay class="w-full h-10 invert brightness-125"></audio>
                </div>`;
            }

            document.getElementById('buyBtn').onclick = () => {
                const text = `¡Hola! Me interesa comprar el beat "${beat.title}" por $${beat.price}.`;
                window.open(`https://wa.me/${beat.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(text)}`, '_blank');
            };
            lucide.createIcons();
        };

        window.deleteBeat = async (id) => {
            if(confirm("¿Eliminar track del catálogo?")) {
                try {
                    await deleteDoc(doc(db, 'beats', id));
                } catch(e) { console.error("Error al borrar:", e); }
            }
        };

        const processLink = (url) => {
            if (!url) return { type: 'direct', src: '' };
            if (url.includes('dropbox.com')) return { type: 'dropbox', src: url.replace(/dl=0|dl=1/, 'raw=1') };
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|&v=))([^#&?]{11})/)?.[1];
                return { type: 'youtube', src: id };
            }
            return { type: 'direct', src: url };
        };

        signInAnonymously(auth).catch(err => console.error("Error de conexión:", err));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Escuchando tu colección "beats"
                const q = collection(db, 'beats');
                onSnapshot(q, (snap) => {
                    beats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    window.renderBeats();
                }, (err) => {
                    console.error("Error de base de datos:", err);
                    alert("Revisa que las reglas de tu base de datos permitan lectura/escritura.");
                });
            }
        });

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>PUBLICANDO...</span>';
            
            const media = processLink(document.getElementById('url').value);
            
            try {
                await addDoc(collection(db, 'beats'), {
                    title: document.getElementById('title').value,
                    url: media.src,
                    type: media.type,
                    price: document.getElementById('price').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    producer: document.getElementById('producer').value || 'Jaddy Studio',
                    email: document.getElementById('email').value || '',
                    paymentMethod: document.getElementById('paymentMethod').value || 'Varios',
                    description: document.getElementById('description').value || '',
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                window.toggleForm();
            } catch (err) {
                console.error("Error al guardar:", err);
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="zap" class="w-5 h-5"></i> PUBLICAR BEAT';
                lucide.createIcons();
            }
        };

        lucide.createIcons();
    </script>
</body>
