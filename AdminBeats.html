    <style>

        <main class="max-w-5xl mx-auto p-4 pt-8 pb-40">

                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-3">

                                <option value="ambos">Contado y Crédito</option>
                                <option value="contado">Solo Contado</option>
                                <option value="credito">Solo Crédito</option>
                            </select>
                            <input type="number" id="price" step="0.01" placeholder="Precio Total ($)" required>

            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-black italic uppercase tracking-tighter text-white">Catálogo Jaddy INC</h2>
            </div>
            
            <!-- Lista con scroll horizontal prevenido y mejor organización móvil -->
            <div id="beatsList" class="flex flex-col gap-3"></div>
        </main>

        <!-- Player Responsivo -->
        <div id="masterPlayer" class="hidden fixed bottom-0 left-0 right-0 z-[100] glass-player p-4 md:p-6 shadow-2xl border-t border-orange-600/20">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2 text-white overflow-hidden">
                        <i data-lucide="music" class="text-orange-500 w-4 h-4 shrink-0"></i>
                        <h4 id="playTitle" class="font-black uppercase tracking-widest text-[10px] truncate"></h4>
                    </div>
                    <button onclick="window.closePlayer()" class="text-neutral-500 hover:text-white transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="flex flex-col md:grid md:grid-cols-12 gap-4 items-center">
                    <div class="w-full md:col-span-7" id="mediaContainer"></div>
                    
                    <div class="w-full md:col-span-5 flex flex-col gap-2">
                        <div id="pricingTabs" class="flex bg-white/5 p-1 rounded-lg">
                            <button onclick="window.switchPricing('contado')" id="tabContado" class="flex-1 py-1.5 text-[9px] font-bold uppercase rounded-md transition-all tab-active">Contado</button>
                            <button onclick="window.switchPricing('credito')" id="tabCredito" class="flex-1 py-1.5 text-[9px] font-bold uppercase rounded-md transition-all">Crédito</button>
                        </div>

                        <div class="bg-white/[0.03] p-4 rounded-2xl border border-white/5 flex flex-col justify-center">
                            <div id="contadoInfo" class="text-center">
                                <p id="playPrice" class="text-3xl font-black italic text-white leading-none"></p>
                                <p class="text-[8px] text-neutral-500 font-bold uppercase tracking-widest mt-1">Pago único</p>
                            </div>
                            <div id="creditoInfo" class="hidden">
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <div class="bg-black/40 p-2 rounded-lg border border-white/5 text-center">
                                        <p class="text-[7px] text-orange-500 font-bold uppercase">Inicial</p>
                                        <p id="creditoInicial" class="text-lg font-black text-white"></p>
                                    </div>
                                    <div class="bg-black/40 p-2 rounded-lg border border-white/5 text-center">
                                        <p id="cuotasLabel" class="text-[7px] text-orange-500 font-bold uppercase"></p>
                                        <p id="creditoCuota" class="text-lg font-black text-white"></p>
                                    </div>
                                </div>
                                <p id="frecuenciaText" class="text-[7px] text-neutral-400 uppercase font-bold text-center"></p>

                                <i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> <span id="btnText">ADQUIRIR</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b",
            measurementId: "G-SBBXXDD3TV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let beats = [];
        let currentBeat = null;
        let selectedMode = 'contado';

        window.toggleForm = () => {
            const form = document.getElementById('beatForm');
            form.classList.toggle('hidden');
            form.classList.toggle('active');
        };

        window.prepareCreate = () => {
            document.getElementById('uploadForm').reset();
            document.getElementById('editingId').value = '';
            document.getElementById('formTitle').innerHTML = '<i data-lucide="plus" class="text-orange-500 w-4 h-4"></i> Nuevo Beat';
            document.getElementById('submitBtnText').innerText = 'PUBLICAR BEAT';
            document.getElementById('submitBtn').className = "w-full bg-orange-600 py-4 rounded-xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-2 transition-all";
            window.toggleForm();
            lucide.createIcons();
        };

        window.prepareEdit = (id) => {
            const beat = beats.find(b => b.id === id);
            if (!beat) return;
            document.getElementById('editingId').value = id;
            document.getElementById('title').value = beat.title;
            document.getElementById('url').value = beat.originalUrl || beat.url;
            document.getElementById('producer').value = beat.producer;
            document.getElementById('saleType').value = beat.saleType;
            document.getElementById('price').value = beat.price;
            document.getElementById('whatsapp').value = beat.whatsapp;
            document.getElementById('downPayment').value = beat.downPayment;
            document.getElementById('installmentsCount').value = beat.installmentsCount;
            document.getElementById('paymentDays').value = beat.paymentDays;

            document.getElementById('formTitle').innerHTML = '<i data-lucide="edit" class="text-blue-500 w-4 h-4"></i> Editar';
            document.getElementById('submitBtnText').innerText = 'ACTUALIZAR';
            document.getElementById('submitBtn').className = "w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-2 transition-all";
            
            if(!document.getElementById('beatForm').classList.contains('active')) window.toggleForm();
            window.toggleCreditFields();
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.toggleCreditFields = () => {
            const saleType = document.getElementById('saleType').value;
            const config = document.getElementById('creditConfig');
            config.style.opacity = (saleType === 'contado') ? '0.3' : '1';
            config.style.pointerEvents = (saleType === 'contado') ? 'none' : 'auto';
        };

        window.renderBeats = () => {
            const list = document.getElementById('beatsList');
            if (beats.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-neutral-600 font-bold uppercase text-[9px]">Sin pistas aún.</div>`;
                return;
            }
            list.innerHTML = beats.map(beat => `
                <div class="beat-card p-3 rounded-2xl border border-white/5 bg-[#0a0a0a] flex items-center gap-3 md:gap-5 hover:border-orange-500/30 transition-all">
                    <button onclick="window.playBeat('${beat.id}')" class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-neutral-400 hover:bg-orange-600 hover:text-white transition-all shrink-0">
                        <i data-lucide="play" class="w-5 h-5 ml-0.5"></i>
                    </button>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <h3 class="font-black uppercase text-white truncate text-xs">${beat.title}</h3>
                            ${beat.saleType !== 'contado' ? '<span class="text-[6px] bg-green-500/10 text-green-500 px-1 py-0.5 rounded font-black uppercase">Crédito</span>' : ''}
                        </div>
                        <p class="text-[8px] text-neutral-500 font-bold uppercase tracking-tighter mt-0.5 truncate">Prod. ${beat.producer}</p>
                    </div>
                    <div class="flex flex-col md:flex-row items-end md:items-center gap-2 shrink-0">
                        <p class="text-sm font-black italic text-white">$${beat.price}</p>
                        <div class="flex gap-1">
                            <button onclick="window.prepareEdit('${beat.id}')" class="p-2 btn-edit bg-white/5 hover:bg-blue-500/10 rounded-lg transition-all">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="window.deleteBeat('${beat.id}')" class="p-2 btn-delete bg-white/5 hover:bg-red-500/10 rounded-lg transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.playBeat = (id) => {
            const beat = beats.find(b => b.id === id);
            if (!beat) return;
            currentBeat = beat;
            document.getElementById('masterPlayer').classList.remove('hidden');
            document.getElementById('playTitle').innerText = beat.title;
            document.getElementById('playPrice').innerText = `$${beat.price}`;

            const tabs = document.getElementById('pricingTabs');
            if(beat.saleType === 'contado') { tabs.classList.add('hidden'); window.switchPricing('contado'); }
            else if(beat.saleType === 'credito') { tabs.classList.add('hidden'); window.switchPricing('credito'); }
            else { tabs.classList.remove('hidden'); window.switchPricing('contado'); }

            if(beat.saleType !== 'contado') {
                const count = parseInt(beat.installmentsCount) || 1;
                const inicial = parseFloat(beat.downPayment) || 0;
                const cuotaMonto = ((beat.price - inicial) / count).toFixed(2);
                document.getElementById('creditoInicial').innerText = `$${inicial}`;
                document.getElementById('cuotasLabel').innerText = `${count} Cuotas`;
                document.getElementById('creditoCuota').innerText = `$${cuotaMonto}`;
                document.getElementById('frecuenciaText').innerText = `Cada ${beat.paymentDays} días`;
            }

            const media = document.getElementById('mediaContainer');
            if(beat.type === 'youtube') {
                media.innerHTML = `<div class="aspect-video rounded-2xl overflow-hidden border border-white/10 shadow-lg"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${beat.url}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
            } else {
                media.innerHTML = `<div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                    <div class="flex justify-center items-end gap-1 h-8 mb-4">
                        ${Array(20).fill('<div class="w-1 bg-orange-600 rounded-full animate-audio-bar"></div>').join('')}
                    </div>
                    <audio src="${beat.url}" controls autoplay class="w-full h-8 invert brightness-150"></audio>
                </div>`;
            }

            document.getElementById('buyBtn').onclick = () => {
                let msg = selectedMode === 'contado' 
                    ? `¡Hola Jaddy! Me interesa "${beat.title}" al contado por $${beat.price}.`
                    : `¡Hola! Quiero el plan de crédito para "${beat.title}". Pago hoy $${beat.downPayment} de inicial.`;
                window.open(`https://wa.me/${beat.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
            };
            lucide.createIcons();
        };

        window.switchPricing = (mode) => {
            selectedMode = mode;
            document.getElementById('tabContado').classList.toggle('tab-active', mode === 'contado');
            document.getElementById('tabCredito').classList.toggle('tab-active', mode === 'credito');
            document.getElementById('contadoInfo').classList.toggle('hidden', mode === 'credito');
            document.getElementById('creditoInfo').classList.toggle('hidden', mode === 'contado');
            document.getElementById('btnText').innerText = mode === 'contado' ? 'PAGAR AL CONTADO' : 'INICIAR CRÉDITO';
        };

        window.closePlayer = () => { document.getElementById('masterPlayer').classList.add('hidden'); document.getElementById('mediaContainer').innerHTML = ''; };

        window.deleteBeat = async (id) => {
            if (confirm("¿Borrar pista definitivamente?")) await deleteDoc(doc(db, 'beats', id));
        };

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, 'beats'), (snap) => {
                    beats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    window.renderBeats();
                });
            }
        });

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const editingId = document.getElementById('editingId').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'PROCESANDO...';

            const rawUrl = document.getElementById('url').value;
            let type = 'direct';
            let src = rawUrl;
            if (src.includes('dropbox.com')) src = src.replace(/dl=0|dl=1/, 'raw=1');
            if (src.includes('youtube.com') || src.includes('youtu.be')) {
                type = 'youtube';
                src = src.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|&v=))([^#&?]{11})/)?.[1];
            }

            const data = {
                title: document.getElementById('title').value,
                url: src,
                originalUrl: rawUrl,
                type: type,
                price: parseFloat(document.getElementById('price').value),
                saleType: document.getElementById('saleType').value,
                downPayment: document.getElementById('downPayment').value || 0,
                installmentsCount: document.getElementById('installmentsCount').value || 0,
                paymentDays: document.getElementById('paymentDays').value || 0,
                whatsapp: document.getElementById('whatsapp').value,
                producer: document.getElementById('producer').value || 'Jaddy INC',
                updatedAt: serverTimestamp()
            };

            try {
                if (editingId) { await updateDoc(doc(db, 'beats', editingId), data); } 
                else { data.createdAt = serverTimestamp(); await addDoc(collection(db, 'beats'), data); }
                e.target.reset();
                window.toggleForm();
            } catch (err) { alert(err.message); } 
            finally { btn.disabled = false; lucide.createIcons(); }
        };

        lucide.createIcons();
    </script>
</body>
</html>
