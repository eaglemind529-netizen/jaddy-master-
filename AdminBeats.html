                            <select id="saleType" onchange="window.toggleCreditFields()">

                                <option value="ambos">Ambos (Contado y Crédito)</option>
                            </select>
                            <input type="number" id="price" step="0.01" placeholder="Precio Total ($)" required>
                            
                            <div id="creditConfig" class="space-y-3 bg-orange-600/5 p-4 rounded-2xl border border-orange-500/10">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b",
            measurementId: "G-SBBXXDD3TV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let beats = [];

        signInAnonymously(auth).then(() => {
            onSnapshot(collection(db, 'beats'), (snap) => {
                beats = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });
        });

        window.toggleForm = () => {
            const form = document.getElementById('beatForm');
            form.classList.toggle('hidden');
            form.classList.toggle('active');
        };

        window.prepareCreate = () => {
            document.getElementById('uploadForm').reset();
            document.getElementById('editingId').value = '';
            document.getElementById('formTitle').innerHTML = '<i data-lucide="plus" class="text-orange-500 w-4 h-4"></i> Nuevo Beat';
            document.getElementById('submitBtnText').innerText = 'PUBLICAR BEAT';
            window.toggleForm();
            window.toggleCreditFields();
            lucide.createIcons();
        };

        window.toggleCreditFields = () => {
            const saleType = document.getElementById('saleType').value;
            const config = document.getElementById('creditConfig');
            if(saleType === 'contado') {
                config.style.opacity = '0.3';
                config.style.pointerEvents = 'none';
            } else {
                config.style.opacity = '1';
                config.style.pointerEvents = 'auto';
            }
        };

        function render() {
            document.getElementById('counter').innerText = `${beats.length} PISTAS TOTALES`;
            const list = document.getElementById('beatsList');
            if (beats.length === 0) {
                list.innerHTML = `<div class="p-20 text-center text-neutral-700 font-bold uppercase text-[10px]">No hay beats en la base de datos</div>`;
                return;
            }

            list.innerHTML = beats.map(b => `
                <div class="bg-[#0a0a0a] border border-white/5 p-4 rounded-2xl flex items-center gap-4 hover:border-orange-500/20 transition-all ${!b.visible ? 'opacity-40' : ''}">
                    <div class="w-10 h-10 bg-white/5 rounded-lg flex items-center justify-center text-orange-500">
                        <i data-lucide="${b.targetPortal === 'vip' ? 'star' : 'music'}" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h3 class="text-xs font-black uppercase text-white truncate">${b.title}</h3>
                            <span class="text-[7px] px-1.5 py-0.5 rounded border ${b.targetPortal === 'vip' ? 'border-orange-500 text-orange-500' : 'border-blue-500 text-blue-500'} font-bold uppercase">
                                ${b.targetPortal === 'vip' ? 'VIP' : (b.category || 'Licencia')}
                            </span>
                            ${!b.visible ? '<span class="text-[7px] bg-red-500/20 text-red-500 px-1.5 py-0.5 rounded font-bold uppercase">Oculto</span>' : ''}
                        </div>
                        <p class="text-[8px] text-neutral-600 font-bold uppercase mt-0.5">Prod. ${b.producer || 'Jaddy Studio'} | $${b.price}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.prepareEdit('${b.id}')" class="p-2 bg-white/5 hover:bg-orange-500/10 text-neutral-400 hover:text-orange-500 rounded-lg transition-all">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="window.deleteBeat('${b.id}')" class="p-2 bg-white/5 hover:bg-red-500/10 text-neutral-400 hover:text-red-500 rounded-lg transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.prepareEdit = (id) => {
            const b = beats.find(x => x.id === id);
            if(!b) return;
            document.getElementById('editingId').value = b.id;
            document.getElementById('title').value = b.title;
            document.getElementById('producer').value = b.producer || '';
            document.getElementById('category').value = b.category || 'licencia';
            document.getElementById('targetPortal').value = b.targetPortal || 'marketplace';
            document.getElementById('isVisible').checked = b.visible !== false;
            document.getElementById('url').value = b.url;
            document.getElementById('genre').value = b.genre || '';
            document.getElementById('whatsapp').value = b.whatsapp;
            document.getElementById('description').value = b.description || '';
            document.getElementById('saleType').value = b.saleType || 'contado';
            document.getElementById('price').value = b.price;
            document.getElementById('downPayment').value = b.downPayment || '';
            document.getElementById('installmentsCount').value = b.installmentsCount || '';
            document.getElementById('paymentDays').value = b.paymentDays || '';

            document.getElementById('formTitle').innerHTML = `<i data-lucide="edit" class="text-orange-500 w-4 h-4"></i> Editando: ${b.title}`;
            document.getElementById('submitBtnText').innerText = 'ACTUALIZAR DATOS';
            if(!document.getElementById('beatForm').classList.contains('active')) window.toggleForm();
            window.toggleCreditFields();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editingId').value;
            
            let cleanUrl = document.getElementById('url').value;
            if(cleanUrl.includes('youtube.com/watch?v=')) cleanUrl = cleanUrl.split('v=')[1].split('&')[0];
            else if(cleanUrl.includes('youtu.be/')) cleanUrl = cleanUrl.split('youtu.be/')[1].split('?')[0];

            const data = {
                title: document.getElementById('title').value,
                producer: document.getElementById('producer').value || 'Jaddy Studio',
                category: document.getElementById('category').value,
                targetPortal: document.getElementById('targetPortal').value,
                visible: document.getElementById('isVisible').checked,
                url: cleanUrl,
                type: cleanUrl.length < 20 ? 'youtube' : 'audio',
                genre: document.getElementById('genre').value,
                whatsapp: document.getElementById('whatsapp').value,
                description: document.getElementById('description').value,
                saleType: document.getElementById('saleType').value,
                price: parseFloat(document.getElementById('price').value),
                downPayment: document.getElementById('downPayment').value,
                installmentsCount: document.getElementById('installmentsCount').value,
                paymentDays: document.getElementById('paymentDays').value,
                updatedAt: serverTimestamp()
            };

            try {
                if(id) await updateDoc(doc(db, 'beats', id), data);
                else await addDoc(collection(db, 'beats'), { ...data, createdAt: serverTimestamp() });
                
                window.toggleForm();
                document.getElementById('uploadForm').reset();
            } catch (err) { alert("Error al guardar: " + err.message); }
        };

        window.deleteBeat = async (id) => {
            if(confirm("¿Seguro que quieres eliminar esta pista del sistema?")) {
                await deleteDoc(doc(db, 'beats', id));
            }
        };

    </script>
</body>
</html>
