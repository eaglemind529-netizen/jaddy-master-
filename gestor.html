    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden items-end sm:items-center justify-center z-[100] p-6">

                <input type="email" id="new-email" placeholder="Email Registrado" class="w-full bg-black border border-white/5 rounded-2xl p-5 text-xs text-white outline-none focus:border-[#D4AF37] transition-all">
                <div class="flex gap-4 pt-6">

                </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuración basada en tu app 'apps-d45d6'
        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let dataCache = [];

        // Conexión inicial
        async function start() {
            try {
                await signInAnonymously(auth);
                document.getElementById('status-light').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('status-text').innerText = "Sistema Online";
                document.getElementById('status-text').classList.replace('text-gray-500', 'text-white');
                sync();
            } catch (e) { console.error(e); }
        }

        function sync() {
            // Colección central de Jaddy INC
            onSnapshot(collection(db, "usuarios"), (snap) => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('counter').innerText = snap.size;
                
                dataCache = snap.docs.map(d => ({
                    id: d.id,
                    ...d.data(),
                    nombre: d.data().negocio || d.data().nombre || "Comercio Elite",
                    email: d.data().email || d.id,
                    status: d.data().status || "activo"
                }));
                render(dataCache);
            });
        }

        function render(list) {
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = "";
            
            list.forEach(u => {
                const isActive = u.status === 'activo';
                const div = document.createElement('div');
                div.className = "luxury-card rounded-[2.8rem] p-8 shadow-2xl relative overflow-hidden group";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div class="flex items-center gap-5">
                            <div class="w-16 h-16 rounded-[1.4rem] flex items-center justify-center border transition-all duration-500 ${isActive ? 'bg-green-500/5 border-green-500/20 text-green-500' : 'bg-red-500/5 border-red-500/20 text-red-500'}">
                                <i class="fas ${isActive ? 'fa-check-circle' : 'fa-ban'} text-2xl"></i>
                            </div>
                            <div>
                                <h3 class="font-black text-white text-lg tracking-tighter uppercase italic group-hover:text-[#D4AF37] transition-colors">${u.nombre}</h3>
                                <p class="text-[10px] text-gray-500 font-mono tracking-tight lowercase opacity-70">${u.email}</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="toggleStatus('${u.id}', '${u.status}')" class="w-full py-5 rounded-2xl font-black text-[10px] tracking-[0.4em] border transition-all active:scale-[0.98] uppercase shadow-lg ${isActive ? 'border-red-600/30 text-red-500 bg-red-600/5 hover:bg-red-600/10' : 'border-green-600/30 text-green-500 bg-green-600/5 hover:bg-green-600/10'}">
                        ${isActive ? 'Suspender Licencia' : 'Activar Licencia'}
                    </button>
                `;
                listDiv.appendChild(div);
            });
        }

        window.toggleStatus = async (id, status) => {
            const newStatus = status === 'activo' ? 'bloqueado' : 'activo';
            await updateDoc(doc(db, "usuarios", id), { status: newStatus });
        };

        window.createLicense = async () => {
            const email = document.getElementById('new-email').value.trim().toLowerCase();
            const name = document.getElementById('new-name').value.trim();
            if (!email) return;

            await setDoc(doc(db, "usuarios", email), {
                negocio: name || "Comercio Jaddy",
                email: email,
                status: "activo",
                creado: serverTimestamp()
            });
            toggleModal(false);
            document.getElementById('new-email').value = "";
            document.getElementById('new-name').value = "";
        };

        window.toggleModal = (val) => document.getElementById('modal').style.display = val ? 'flex' : 'none';

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(dataCache.filter(u => u.nombre.toLowerCase().includes(val) || u.email.toLowerCase().includes(val)));
        };

        start();
    </script>
</body>
