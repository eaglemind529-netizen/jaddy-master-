<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODUCTOS LS | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #000; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background-color: #f3f4f6; }
        .product-card { background: white; padding: 15px; text-align: center; position: relative; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; margin-bottom: 8px; }
        #productModal { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #productModal.active { display: flex; transform: translateY(0); }
        .modal-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .variant-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #fff; border-radius: 18px; border: 2px solid #f0f0f0; margin-bottom: 10px; cursor: pointer; }
        .variant-card.selected { border-color: #000; }
        #cartBar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #000; color: white; padding: 16px 22px; border-radius: 20px; display: none; justify-content: space-between; align-items: center; z-index: 1100; }
        .close-btn { position: absolute; top: 15px; right: 15px; z-index: 1010; background: #f0f0f0; border-radius: 50%; padding: 8px; }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold text-xs italic">LS</div>
            <h1 class="font-black text-[13px] uppercase tracking-tighter italic">PRODUCTOS LS</h1>
        </div>
        <button id="authBtn" class="bg-black text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest">
            Acceder
        </button>
    </header>

    <div id="catalogGrid" class="product-grid"></div>

    <!-- Modal que ya existía -->
    <div id="productModal">
        <button onclick="closeModal()" class="close-btn"><i data-lucide="x" class="w-5 h-5"></i></button>
        <div class="pt-14 px-6 pb-4">
            <h2 id="modalTitle" class="text-2xl font-black italic uppercase leading-none mb-1">---</h2>
        </div>
        <div class="modal-scroll"><div id="variantsContainer"></div></div>
    </div>

    <div id="cartBar"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrjjeOoXPOtJDXDfrHLOA4Ny0QW2zfVWk",
            authDomain: "apps-d45d6.firebaseapp.com",
            projectId: "apps-d45d6",
            storageBucket: "apps-d45d6.firebasestorage.app",
            messagingSenderId: "502648373937",
            appId: "1:502648373937:web:8c3beaa2a6c9289a4d9890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Autenticación
        document.getElementById('authBtn').addEventListener('click', async () => {
            await signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        // Catálogo y Modal (La lógica que ya funcionaba)
        let products = [];
        const cleanUrl = (url) => url ? url.trim().replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com') : "https://via.placeholder.com/400";

        onSnapshot(query(collection(db, "perfumes"), orderBy("name", "asc")), (snap) => {
            products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal('${p.id}')">
                    <img src="${cleanUrl(p.img)}">
                    <h3 class="text-[9px] font-black uppercase italic truncate px-2">${p.name}</h3>
                    <p class="text-[11px] font-bold text-black">$${p.priceNew || '---'}</p>
                </div>`).join('');
            lucide.createIcons();
        }

        window.openModal = (id) => {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('productModal').classList.add('active');
            document.getElementById('variantsContainer').innerHTML = (p.variants || []).map(v => `
                <div class="variant-card">
                    <img src="${cleanUrl(v.img || p.img)}" class="w-12 h-12">
                    <div><h4 class="font-black text-[10px]">${v.title}</h4><p class="font-black">$${v.priceNew}</p></div>
                </div>`).join('');
        };

        window.closeModal = () => document.getElementById('productModal').classList.remove('active');
    </script>
</body>
</html>
