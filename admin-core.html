    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b",
            measurementId: "G-SBBXXDD3TV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Functions
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => {
            document.getElementById(id).style.display = 'none';
            const creditFields = document.querySelectorAll('.credit-fields');
            creditFields.forEach(f => f.style.display = 'none');
        };

        window.toggleCreditFields = (containerId, isChecked) => {
            document.getElementById(containerId).style.display = isChecked ? 'block' : 'none';
        };

        // Sale Registration
        document.getElementById('saleForm').onsubmit = async (e) => {
            e.preventDefault();
            const isCredit = document.getElementById('isCreditSale').checked;
            const data = {
                beatName: document.getElementById('beatName').value,
                customerName: document.getElementById('customerName').value,
                amount: parseFloat(document.getElementById('saleAmount').value),
                licenseType: document.getElementById('licenseType').value,
                hasRecording: document.getElementById('hasRecording').checked,
                isCredit: isCredit,
                createdAt: serverTimestamp()
            };

            if (isCredit) {
                data.songName = document.getElementById('songNameSale').value;
                data.amountPaid = parseFloat(document.getElementById('amountPaidSale').value || 0);
                data.dueDate = document.getElementById('dueDateSale').value;
            }

            await addDoc(collection(db, "ventas"), data);
            e.target.reset();
            closeModal('saleModal');
        };

        // VIP Registration
        document.getElementById('vipForm').onsubmit = async (e) => {
            e.preventDefault();
            const isCredit = document.getElementById('isCreditVip').checked;
            const data = {
                artistName: document.getElementById('artistName').value,
                projectName: document.getElementById('projectName').value,
                totalProyecto: parseFloat(document.getElementById('totalProject').value),
                abono: parseFloat(document.getElementById('abonoInitial').value),
                isCredit: isCredit,
                updatedAt: serverTimestamp()
            };

            if (isCredit) {
                data.songName = document.getElementById('songNameVip').value;
                data.dueDate = document.getElementById('dueDateVip').value;
            }

            await addDoc(collection(db, "artistasVIP"), data);
            e.target.reset();
            closeModal('vipModal');
        };

        // Delete Sale
        window.deleteSale = async (id) => {
            if(confirm("¿Seguro que deseas borrar este registro?")) {
                await deleteDoc(doc(db, "ventas", id));
            }
        };

        // Global Balances and Monitors
        let totalRevenueVentas = 0;
        let totalRevenueVIP = 0;

        function updateGlobalRecaudado() {
            const total = totalRevenueVentas + totalRevenueVIP;
            document.getElementById('totalRevenueDisplay').innerText = `$${total.toLocaleString()}`;
        }

        // VIP Monitor
        onSnapshot(collection(db, "artistasVIP"), (snapshot) => {
            const grid = document.getElementById('monitorGrid');
            grid.innerHTML = '';
            let totalDeuda = 0;
            let currentVIPRevenue = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const abono = parseFloat(data.abono || 0);
                const total = parseFloat(data.totalProyecto || 0);
                const deuda = total - abono;
                
                totalDeuda += deuda;
                currentVIPRevenue += abono; // Solo sumamos el abono al recaudado

                const card = document.createElement('div');
                card.className = 'glass-panel p-5 border-l-4 ' + (deuda > 0 ? 'border-red-500' : 'border-emerald-500');
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-bold text-sm uppercase italic">${data.artistName}</h4>
                            <p class="text-[9px] text-neutral-500 uppercase font-bold">${data.projectName} ${data.isCredit ? '• <span class="text-orange-500">CRÉDITO</span>' : ''}</p>
                            ${data.songName ? `<p class="text-[8px] text-orange-500 font-bold mt-1 uppercase italic">${data.songName}</p>` : ''}
                        </div>
                        <span class="status-badge ${deuda > 0 ? 'bg-red-500/10 text-red-500' : 'bg-emerald-500/10 text-emerald-500'}">
                            $${deuda > 0 ? deuda : 'LISTO'}
                        </span>
                    </div>
                    ${data.dueDate ? `<p class="text-[8px] text-neutral-600 mb-2 font-bold uppercase tracking-widest">Pagar antes de: ${data.dueDate}</p>` : ''}
                    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-orange-500 transition-all duration-500" style="width: ${(abono/total)*100}%"></div>
                    </div>
                `;
                grid.appendChild(card);
            });
            totalRevenueVIP = currentVIPRevenue;
            document.getElementById('totalDebtDisplay').innerText = `$${totalDeuda.toLocaleString()}`;
            updateGlobalRecaudado();
        });

        // Sales Monitor
        const qVentas = query(collection(db, "ventas"), orderBy("createdAt", "desc"));
        onSnapshot(qVentas, (snapshot) => {
            const log = document.getElementById('activityLog');
            log.innerHTML = '';
            let currentVentasRevenue = 0;

            snapshot.forEach((documento) => {
                const data = documento.data();
                
                // Lógica de cálculo solicitada:
                // Si es crédito: sumamos amountPaid (lo abonado)
                // Si NO es crédito: sumamos amount (el total al contado)
                const realCashIn = data.isCredit ? (parseFloat(data.amountPaid) || 0) : (parseFloat(data.amount) || 0);
                currentVentasRevenue += realCashIn;

                const item = document.createElement('div');
                item.className = 'sale-item p-4 flex justify-between items-center hover:bg-white/[0.02] transition-colors group';
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center">
                            <i data-lucide="music" class="text-blue-400 w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-[11px] font-bold uppercase italic">${data.beatName}</p>
                            <div class="flex items-center gap-2 flex-wrap">
                                <p class="text-[9px] text-neutral-500 uppercase">${data.customerName}</p>
                                ${data.hasRecording ? '<span class="text-[8px] bg-orange-500/20 text-orange-500 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter italic">+ Grabación</span>' : ''}
                                ${data.isCredit ? '<span class="text-[8px] bg-red-500/20 text-red-500 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter italic">Crédito</span>' : ''}
                                ${data.songName ? `<span class="text-[8px] text-neutral-600 font-bold italic">Tema: ${data.songName}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="text-emerald-400 font-black italic">+$${realCashIn}</p>
                            <p class="text-[8px] text-neutral-600 uppercase font-bold">${data.licenseType}${data.isCredit ? ' (ABONO)' : ''}</p>
                        </div>
                        <button onclick="deleteSale('${documento.id}')" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-500 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                log.appendChild(item);
            });
            totalRevenueVentas = currentVentasRevenue;
            updateGlobalRecaudado();
            lucide.createIcons();
        });

        // Catalog Count
        onSnapshot(collection(db, "beats"), (snapshot) => {
            document.getElementById('catalogCount').innerText = `${snapshot.size} Activos`;
        });

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
