<!DOCTYPE html>

            backdrop-filter: blur(10px);
        }
        .glow-orange { box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }

</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-black/60 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center glow-orange">
                    <i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i>

                    <h1 class="text-xl font-black uppercase italic tracking-tighter leading-none">Admins Core</h1>

            <div class="text-right">

    <main class="max-w-[1600px] mx-auto p-6 lg:p-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-panel p-8 rounded-[2rem]">
                <p class="text-[9px] font-black text-neutral-500 uppercase tracking-widest mb-2">Artistas VIP</p>
                <h2 id="totalArtists" class="text-4xl font-black italic">0</h2>

            <div class="glass-panel p-8 rounded-[2rem] md:col-span-2">

                </div>

                <h3 class="text-lg font-black uppercase italic tracking-tighter text-white px-2">Log del Sistema</h3>
                <div id="activityLog" class="glass-panel p-6 rounded-[2.5rem] h-[500px] overflow-y-auto space-y-4">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // AQUÍ ESTÁ EL CAMBIO: Apuntamos directamente a tu colección principal
        const artistasRef = collection(db, 'artistasVIP');

        onSnapshot(query(artistasRef, orderBy('updatedAt', 'desc')), (snapshot) => {
            const grid = document.getElementById('monitorGrid');
            const totalArtistsEl = document.getElementById('totalArtists');
            const totalRevenueEl = document.getElementById('totalRevenueDisplay');
            const log = document.getElementById('activityLog');
            
            grid.innerHTML = '';
            let totalMoney = 0;
            let count = 0;

            snapshot.forEach(docSnap => {
                const a = docSnap.data();
                count++;
                // Sumamos el abono que tiene cada artista
                totalMoney += parseFloat(a.abono || 0);

                const card = document.createElement('div');
                card.className = "glass-panel p-6 rounded-3xl flex items-center justify-between group";
                card.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10">
                             <i data-lucide="mic" class="text-orange-500 w-6 h-6"></i>
                        </div>
                        <div>
                            <h4 class="font-black italic uppercase text-lg text-white tracking-tighter leading-none">${a.artistName}</h4>
                            <p class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest mt-1">${a.plan || 'Plan VIP'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black text-neutral-500 uppercase mb-1 italic">Monto Abonado</p>
                        <p class="text-2xl font-black text-emerald-500 italic tracking-tighter leading-none">$${(a.abono || 0).toLocaleString()}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            totalArtistsEl.innerText = count;
            totalRevenueEl.innerText = `$${totalMoney.toLocaleString()}`;
            
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `<div class="p-3 border-b border-white/5"><p class="text-[9px] font-black text-orange-500 uppercase">${time}</p><p class="text-[10px] text-white">Sincronizados ${count} artistas exitosamente.</p></div>` + log.innerHTML;
            
            lucide.createIcons();
        });
    </script>
</body>
</html>
