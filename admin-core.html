<!DOCTYPE html>

    <style>
        :root {

<body class="min-h-screen">

    <header class="w-full border-b border-[#1a1a1a] bg-[#080808]/80 backdrop-blur-xl sticky top-0 z-[100] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">

                <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center">

                <h1 class="text-lg font-extrabold tracking-tighter uppercase italic">Jaddy Studio</h1>

            <div class="flex gap-3 items-center">
                <a href="ingresos_globales.html" class="btn-finance px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center gap-2 transition-all">

                </button>
            </div>
        </div>
    </header>

    <section class="w-full px-6 pt-8 pb-4">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="stat-card p-6 rounded-3xl flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center border border-emerald-500/20">
                    <i data-lucide="wallet" class="text-emerald-500 w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-neutral-500 uppercase tracking-[0.2em] mb-1">Recaudado (Proyectos)</p>
                    <h2 id="totalRevenueDisplay" class="text-3xl font-black text-emerald-400 italic leading-none">$0.00</h2>
                </div>
            </div>

            <div class="stat-card p-6 rounded-3xl flex items-center gap-5 border-red-500/10">
                <div class="w-14 h-14 bg-red-500/10 rounded-2xl flex items-center justify-center border border-red-500/20">
                    <i data-lucide="alert-triangle" class="text-red-500 w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-red-500/60 uppercase tracking-[0.2em] mb-1">Cuentas por Cobrar</p>
                    <h2 id="totalDebtDisplay" class="text-3xl font-black text-red-500 italic leading-none">$0.00</h2>
                </div>
            </div>

            <div class="stat-card p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center border border-orange-500/20">

                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-neutral-500 uppercase tracking-[0.2em] mb-1">Catálogo Beats</p>
                        <h2 id="catalogCount" class="text-2xl font-black italic leading-none">0 Activos</h2>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="w-full px-6 py-4">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <h3 class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.3em] px-2 flex items-center gap-2">
                    <i data-lucide="users" class="w-4 h-4"></i> Producción VIP
                </h3>
                <div id="monitorGrid" class="space-y-3 max-h-[600px] overflow-y-auto custom-scrollbar pr-2"></div>

                <h3 class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.3em] px-2 flex items-center gap-2">
                    <i data-lucide="history" class="w-4 h-4"></i> Ventas de Beats Recientes
                </h3>
                <div class="glass-panel overflow-hidden">
                    <div id="activityLog" class="divide-y divide-[#1a1a1a]"></div>
                </div>
            </div>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            messagingSenderId: "968903268866",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b",
            measurementId: "G-SBBXXDD3TV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función global para eliminar ventas
        window.deleteSale = async (id) => {
            if(confirm("¿Estás seguro de eliminar esta venta? Esta acción no se puede deshacer.")) {
                try {
                    await deleteDoc(doc(db, "ventas", id));
                } catch (error) {
                    console.error("Error al eliminar:", error);
                }
            }
        };

        // Monitoreo VIP
        onSnapshot(collection(db, "artistasVIP"), (snapshot) => {
            const grid = document.getElementById('monitorGrid');
            grid.innerHTML = '';
            let totalDeuda = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const abono = parseFloat(data.abono || 0);
                const total = parseFloat(data.totalProyecto || 0);
                const deuda = total - abono;
                totalDeuda += deuda;

                const card = document.createElement('div');
                card.className = 'glass-panel p-5 border-l-4 ' + (deuda > 0 ? 'border-red-500' : 'border-emerald-500');
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-bold text-sm uppercase italic">${data.artistName}</h4>
                            <p class="text-[9px] text-neutral-500 uppercase font-bold">${data.projectName || 'Sin nombre'}</p>
                        </div>
                        <span class="status-badge ${deuda > 0 ? 'bg-red-500/10 text-red-500' : 'bg-emerald-500/10 text-emerald-500'}">
                            ${deuda > 0 ? 'Deuda: $' + deuda : 'Pagado'}
                        </span>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="text-[10px] font-black text-neutral-400">$${abono} / $${total}</p>
                        <div class="w-24 h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-orange-500" style="width: ${(abono/total)*100}%"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('totalDebtDisplay').innerText = `$${totalDeuda.toLocaleString()}`;
        });

        // Ventas de Beats con opción de eliminar
        const qVentas = query(collection(db, "ventas"), orderBy("createdAt", "desc"));
        onSnapshot(qVentas, (snapshot) => {
            const log = document.getElementById('activityLog');
            log.innerHTML = '';
            let totalVentas = 0;

            snapshot.forEach((documento) => {
                const data = documento.data();
                const id = documento.id;
                totalVentas += parseFloat(data.amount || 0);

                const item = document.createElement('div');
                item.className = 'sale-item p-4 flex justify-between items-center hover:bg-white/[0.02] transition-colors group';
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center">
                            <i data-lucide="music" class="text-blue-400 w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-[11px] font-bold uppercase italic">${data.beatName}</p>
                            <p class="text-[9px] text-neutral-500 uppercase">${data.customerName || 'Cliente'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="text-emerald-400 font-black italic">+$${data.amount}</p>
                            <p class="text-[8px] text-neutral-600 uppercase font-bold">${data.licenseType || 'MP3'}</p>
                        </div>
                        <button onclick="deleteSale('${id}')" class="delete-btn p-2 hover:bg-red-500/20 rounded-lg text-red-500 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                log.appendChild(item);
            });
            document.getElementById('totalRevenueDisplay').innerText = `$${totalVentas.toLocaleString()}`;
            lucide.createIcons();
        });

        onSnapshot(collection(db, "beats"), (snapshot) => {
            document.getElementById('catalogCount').innerText = `${snapshot.size} Activos`;
        });

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
