```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio | Portal VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #e0e0e0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-white/5 bg-black/80 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-white font-black italic uppercase tracking-tighter">Jaddy Studio <span class="text-orange-500">VIP</span></h1>
            <div class="flex gap-4 items-center">
                <button onclick="window.toggleView('all')" id="btn-all" class="text-[9px] font-black uppercase text-orange-500">Catálogo</button>
                <button onclick="window.toggleView('favs')" id="btn-favs" class="text-[9px] font-black uppercase text-neutral-500">Favoritos</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32">
        <h2 id="sectionTitle" class="text-[10px] font-black text-neutral-500 uppercase tracking-widest mb-6">Pistas exclusivas para Artistas VIP</h2>
        <div id="beatsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <div id="playerContainer" class="fixed bottom-0 w-full bg-black border-t border-orange-500/20 p-4 flex items-center justify-center gap-4 z-[100]">
        <div class="flex flex-col w-1/3">
            <span id="nowPlaying" class="text-[9px] font-black text-white uppercase italic truncate">Selecciona una pista</span>
        </div>
        <audio id="audioPlayer" controls class="h-8 w-1/2"></audio>
        <button onclick="document.getElementById('playerContainer').classList.add('hidden')" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIaAvpJZrJjQUKsh6KGD7gALJNskto8A8",
            authDomain: "jaddy-estudio.firebaseapp.com",
            projectId: "jaddy-estudio",
            storageBucket: "jaddy-estudio.firebasestorage.app",
            appId: "1:968903268866:web:e2b6895e8acff18178e51b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentView = 'all';
        let allBeats = [];
        let favorites = JSON.parse(localStorage.getItem('favs') || '[]');

        window.toggleView = (view) => { 
            currentView = view; 
            document.getElementById('btn-all').className = view === 'all' ? 'text-[9px] font-black uppercase text-orange-500' : 'text-[9px] font-black uppercase text-neutral-500';
            document.getElementById('btn-favs').className = view === 'favs' ? 'text-[9px] font-black uppercase text-orange-500' : 'text-[9px] font-black uppercase text-neutral-500';
            render(); 
        };

        window.toggleFav = (id) => {
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(favorites));
            render();
        };

        window.playTrack = (title, url) => {
            const player = document.getElementById('audioPlayer');
            document.getElementById('nowPlaying').innerText = title;
            player.src = url; 
            document.getElementById('playerContainer').classList.remove('hidden');
            player.play();
        };

        function render() {
            const grid = document.getElementById('beatsGrid');
            grid.innerHTML = allBeats
                .filter(b => b.visible !== false && b.category === 'artistaVIP')
                .filter(b => currentView === 'all' || favorites.includes(b.id))
                .map(b => `
                    <div class="glass-card p-5 rounded-2xl border ${favorites.includes(b.id) ? 'border-orange-500/30' : 'border-white/5'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-white font-bold text-sm">${b.title}</h3>
                                <p class="text-[9px] text-neutral-500 uppercase">${b.producer}</p>
                            </div>
                            <button onclick="window.toggleFav('${b.id}')" class="${favorites.includes(b.id) ? 'text-orange-500' : 'text-neutral-600'} transition-all">
                                <i data-lucide="heart" class="w-5 h-5 ${favorites.includes(b.id) ? 'fill-current' : ''}"></i>
                            </button>
                        </div>
                        <button onclick="window.playTrack('${b.title}', '${b.url}')" class="w-full py-2 bg-white/5 hover:bg-orange-600 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all">
                            Reproducir
                        </button>
                    </div>
                `).join('');
            lucide.createIcons();
        }

        onSnapshot(collection(db, 'beats'), (snap) => {
            allBeats = snap.docs.map(d => ({id: d.id, ...d.data()}));
            render();
        });
    </script>
</body>
</html>

```
